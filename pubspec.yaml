name: fit_log
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # 🧠 State Management
  flutter_riverpod: ^2.4.0

  # 📦 Local Data Persistence
  path_provider: ^2.1.1
  excel: ^4.0.6 # To read/write .xlsx files
  sqflite: ^2.3.3
  path: ^1.9.0
  file_picker: 10.1.2
  permission_handler: ^11.3.0
  archive: ^3.4.9
  share_plus: ^7.2.1

  # 🧊 Code Generation / Model Helpers
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 📱 UI Essentials
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.4.0
  flutter_slidable: ^3.0.0
  intl: ^0.19.0
  table_calendar: ^3.0.9
  fl_chart: ^0.64.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # 🔔 Feedback
  flutter_local_notifications: ^19.2.1
  vibration: ^3.1.3
  timezone: ^0.10.1

  # 📷 Image Picker (for guide images)
  image_picker: ^1.0.7

  # 🧭 Navigation (optional but clean)
  go_router: ^13.0.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.4
  build_runner: ^2.4.6
  freezed: ^2.4.6
  json_serializable: ^6.7.0
  flutter_lints: ^4.0.0
  vibration_platform_interface: ^0.1.0
  flutter_launcher_icons: ^0.14.3


flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
